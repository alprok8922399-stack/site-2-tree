<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сайт 2 - Матричная Модель</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0b132b;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Шапка */
        header {
            background-color: #1c2541;
            padding: 10px 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            border-bottom: 2px solid #00fff0;
            box-shadow: 0 4px 15px rgba(0, 255, 240, 0.2);
            z-index: 10;
        }

        /* Верхняя строка шапки */
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .logo {
            font-size: 18px;
            font-weight: bold;
            color: #00fff0;
            text-shadow: 0 0 10px rgba(0, 255, 240, 0.5);
        }

        /* Нижняя строка шапки (Управление: поиск, зум) */
        .controls-wrapper {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
            width: 100%;
            flex-wrap: wrap;
        }

        /* Зум в шапке */
        .zoom-container {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(11, 19, 43, 0.6);
            padding: 5px 12px;
            border-radius: 20px;
            border: 1px solid rgba(0, 255, 240, 0.4);
        }

        .zoom-container label {
            font-size: 11px;
            color: #00fff0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .zoom-container input[type="range"] {
            width: 90px;
            accent-color: #00fff0;
            cursor: pointer;
        }

        /* Контейнер поиска */
        .search-container {
            display: flex;
            gap: 5px;
            flex: 1;
            max-width: 250px;
        }

        .search-container input {
            width: 100%;
            padding: 6px 10px;
            border: 1px solid #00fff0;
            background: #0b132b;
            color: white;
            border-radius: 4px;
            outline: none;
            font-size: 13px;
        }

        .search-container button {
            padding: 6px 12px;
            background: #00fff0;
            color: #0b132b;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
            transition: 0.2s;
        }

        .search-container button:hover {
            background: #00b3a8;
            box-shadow: 0 0 8px #00fff0;
        }

        /* Главная рабочая область */
        #screenContainer {
            flex: 1;
            position: relative;
            overflow: auto;
            display: flex;
            justify-content: flex-start;
            align-items: flex-start;
            background: radial-gradient(circle, #1c2541 0%, #0b132b 100%);
            padding: 20px;
            box-sizing: border-box;
        }

        /* Полотно отрисовки матриц */
        #mainTreeDisplay {
            transform-origin: top left;
            transition: transform 0.2s ease-out;
            display: inline-block;
            margin: 0 auto;
        }

        .matrices-row {
            display: flex;
            gap: 40px;
            padding-bottom: 50px;
        }

        /* Стилизация Семерок */
        .semerka-matrix {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            background: rgba(28, 37, 65, 0.6);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #3a506b;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .matrix-row {
            display: flex;
            justify-content: center;
            gap: 15px;
            width: 100%;
        }

        /* Стилизация ячейки */
        .cell {
            width: 70px;
            height: 70px;
            border-radius: 8px;
            border: 2px dashed #3a506b;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 10px;
            background-color: rgba(11, 19, 43, 0.8);
            transition: all 0.3s ease;
            cursor: pointer;
            user-select: none;
            position: relative;
            box-sizing: border-box;
        }

        .cell-id {
            font-size: 9px;
            color: #6c7a89;
            margin-bottom: 2px;
        }

        .cell-user {
            font-weight: bold;
            color: #fff;
            max-width: 65px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* Цвета ячеек по уровням */
        .level-1 { border-color: #ff007f; }
        .level-2 { border-color: #00fff0; }
        .level-3 { border-color: #39ff14; }

        /* Заполненная ячейка */
        .cell.occupied {
            border-style: solid;
            background: linear-gradient(135deg, #1c2541 0%, #3a506b 100%);
            box-shadow: 0 0 10px rgba(0, 255, 240, 0.2);
        }

        /* Ячейка в фокусе (найденная поиском) */
        .cell.focused-cell {
            border-color: #ff3366 !important;
            box-shadow: 0 0 20px #ff3366 !important;
            background: #ff3366 !important;
            animation: pulse-border 1.5s infinite;
        }

        @keyframes pulse-border {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-top">
            <div class="logo">Сайт 2: Матрицы</div>
            <button id="resetBtn" style="padding: 4px 8px; background: #e43f5a; border: none; color: white; border-radius: 4px; cursor: pointer; font-size: 11px;">Сброс БД</button>
        </div>
        
        <div class="controls-wrapper">
            <div class="zoom-container">
                <label for="zoomSlider">Зум</label>
                <input type="range" id="zoomSlider" min="0.2" max="1.5" step="0.05" value="0.8">
            </div>

            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Логин...">
                <button id="searchBtn">Найти</button>
            </div>
        </div>
    </header>

    <div id="screenContainer">
        <div id="mainTreeDisplay"></div>
    </div>

    <script src="matrix.js?v=3"></script>
</body>
</html>
