<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сайт 2 - Матричная Модель</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0b132b;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Главная шапка матриц */
        #matrixHeader {
            background-color: #1c2541;
            padding: 10px 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            border-bottom: 2px solid #00fff0;
            box-shadow: 0 4px 15px rgba(0, 255, 240, 0.2);
            z-index: 10;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .logo {
            font-size: 18px;
            font-weight: bold;
            color: #00fff0;
            text-shadow: 0 0 10px rgba(0, 255, 240, 0.5);
        }

        .header-buttons {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .controls-vertical {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
            max-width: 320px;
        }

        .search-row {
            display: flex;
            gap: 8px;
            width: 100%;
        }

        .search-row input[type="text"] {
            flex: 1;
            padding: 8px 10px;
            border: 1px solid #00fff0;
            background: #0b132b;
            color: white;
            border-radius: 4px;
            outline: none;
            font-size: 14px;
            box-sizing: border-box;
        }

        .search-btn {
            padding: 8px 15px;
            background: #00fff0;
            color: #0b132b;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            box-sizing: border-box;
            white-space: nowrap;
        }

        .zoom-container {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(11, 19, 43, 0.6);
            padding: 6px 10px;
            border-radius: 4px;
            border: 1px solid rgba(0, 255, 240, 0.3);
            box-sizing: border-box;
            width: 100%;
        }

        .zoom-container label {
            font-size: 11px;
            color: #00fff0;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .zoom-container input[type="range"] {
            flex: 1;
            accent-color: #00fff0;
        }

        /* Рабочая зона */
        #screenContainer {
            flex: 1;
            position: relative;
            overflow: auto;
            display: flex;
            justify-content: flex-start;
            align-items: flex-start;
            background: radial-gradient(circle, #1c2541 0%, #0b132b 100%);
            padding: 20px;
            box-sizing: border-box;
        }

        #mainTreeDisplay {
            transform-origin: top left;
            transition: transform 0.2s ease-out;
            display: inline-block;
        }

        /* Кнопка переключения режимов вне скрываемой шапки */
        .floating-toggle-zone {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 999;
        }

        /* Стили для карточек реф-дерева */
        .ref-node {
            display: flex;
            align-items: flex-start;
            margin-bottom: 8px;
            gap: 12px;
        }

        .user-card {
            padding: 8px 12px;
            border-radius: 6px;
            min-width: 130px;
            max-width: 150px;
            box-sizing: border-box;
        }

        .tree-toggle-btn {
            margin-top: 6px;
            background: #00fff0;
            border: none;
            color: #111;
            font-size: 11px;
            padding: 3px 6px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            display: block;
            text-align: center;
        }

        .children-container {
            display: flex;
            flex-direction: column;
            border-left: 1px dashed #00fff0;
            padding-left: 12px;
            gap: 6px;
        }
    </style>
</head>
<body>

    <header id="matrixHeader">
        <div class="header-top">
            <div class="logo">Сайт 2: Матрицы</div>
            <div class="header-buttons">
                <button id="tableBtn" style="padding: 6px 12px; background: #00fff0; border: none; color: #0b132b; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: bold;">таблица</button>
                <button id="resetBtn" style="padding: 6px 10px; background: #e43f5a; border: none; color: white; border-radius: 4px; cursor: pointer; font-size: 12px;">Сброс БД</button>
            </div>
        </div>
        
        <div class="controls-vertical">
            <div class="search-row">
                <input type="text" id="searchInput" placeholder="Логин для поиска...">
                <button class="search-btn" id="searchBtn">Найти</button>
            </div>
            
            <div class="zoom-container">
                <label>Зум</label>
                <input type="range" id="zoomSlider" min="0.02" max="1.5" step="0.05" value="0.8">
            </div>
        </div>
    </header>

    <div id="screenContainer">
        <div id="backToMatricesZone" class="floating-toggle-zone" style="display: none;">
            <button id="tableBtnBack" style="padding: 8px 16px; background: #ffd700; border: none; color: #000; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: bold; box-shadow: 0 0 10px #ffd700;">← В МАТРИЦЫ</button>
        </div>

        <div id="mainTreeDisplay"></div>

        <div id="embeddedTableContainer" style="display: none; width: 100%; height: 100%; overflow: auto; box-sizing: border-box;">
            
            <div style="margin-bottom: 25px; max-width: 100%;">
                <h2 style="color: #ffd700; margin-top: 0; font-size: 20px; margin-bottom: 15px;">🌳 Реферальное Дерево Структуры</h2>
                <div style="display: flex; gap: 8px; max-width: 320px; width: 100%;">
                    <input type="text" id="refSearchInput" placeholder="Логин реферала..." style="flex: 1; padding: 10px; border: 1px solid #ffd700; background: #0b132b; color: white; border-radius: 6px; outline: none; font-size: 14px;">
                    <button id="refSearchBtn" style="padding: 10px 15px; background: #ffd700; color: #000; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 14px;">Найти</button>
                    <button id="refSearchResetBtn" style="padding: 10px; background: #e43f5a; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 14px;">❌</button>
                </div>
            </div>
            
            <div id="interactiveRefTableBody" style="display: flex; flex-direction: column; width: 100%;"></div>
        </div>
    </div>

    <script src="matrix.js?v=7"></script>
    <script src="table.js?v=7"></script>
</body>
</html>
