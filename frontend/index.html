<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-Панель: Бинарное Дерево (Сайт №2)</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #111827;
            --accent-success: #10b981;
            --accent-primary: #3b82f6;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border-color: #1f2937;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
            margin-bottom: 25px;
        }

        h1 {
            font-size: 22px;
            margin: 0;
            color: var(--text-main);
        }

        .btn-reset {
            background-color: #ef4444;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            transition: background-color 0.2s;
        }

        .btn-reset:hover {
            background-color: #dc2626;
        }

        .screen-container {
            width: 100%;
            max-width: 100vw;
            overflow-x: auto; 
            overflow-y: auto; 
            display: block; 
            background: #0f172a;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        canvas {
            display: block;
            margin: 0 auto;
            background-color: #0f172a;
        }

        .user-node.paid {
            border-color: var(--accent-success);
        }

        .user-node.real {
            background-color: rgba(59, 130, 246, 0.2);
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1>🌳 Мониторинг Бинарной Структуры</h1>
            <p style="color: var(--text-muted); margin: 5px 0 0 0; font-size: 13px;">Панель управления матрицами (Сайт №2)</p>
        </div>
        <button class="btn-reset" id="resetBtn">Сбросить дерево (БД)</button>
    </header>

    <div class="screen-container">
        <canvas id="treeCanvas" width="1200" height="750"></canvas>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
