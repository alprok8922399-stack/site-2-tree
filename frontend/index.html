<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сайт 2 - Матричная Модель</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0b132b;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Шапка */
        header {
            background-color: #1c2541;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #00fff0;
            box-shadow: 0 4px 15px rgba(0, 255, 240, 0.2);
            z-index: 10;
        }

        .logo {
            font-size: 20px;
            font-weight: bold;
            color: #00fff0;
            text-shadow: 0 0 10px rgba(0, 255, 240, 0.5);
        }

        /* Контейнер поиска и меню */
        .controls-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .search-container {
            display: flex;
            gap: 5px;
        }

        .search-container input {
            padding: 6px 12px;
            border: 1px solid #00fff0;
            background: #0b132b;
            color: white;
            border-radius: 4px;
            outline: none;
            font-size: 14px;
        }

        .search-container button {
            padding: 6px 12px;
            background: #00fff0;
            color: #0b132b;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .search-container button:hover {
            background: #00b3a8;
            box-shadow: 0 0 8px #00fff0;
        }

        /* Бургер-меню */
        .menu-container {
            position: relative;
        }

        .menu-btn {
            background: #1c2541;
            border: 1px solid #00fff0;
            color: #00fff0;
            font-size: 20px;
            padding: 4px 10px;
            border-radius: 4px;
            cursor: pointer;
        }

        .menu-content {
            display: none;
            position: absolute;
            right: 0;
            top: 35px;
            background: #1c2541;
            border: 1px solid #00fff0;
            border-radius: 4px;
            min-width: 180px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            z-index: 100;
        }

        .menu-content.show {
            display: block;
        }

        .menu-content button {
            width: 100%;
            padding: 10px;
            background: none;
            border: none;
            color: white;
            text-align: left;
            cursor: pointer;
            font-size: 14px;
        }

        .menu-content button:hover {
            background: #00fff0;
            color: #0b132b;
        }

        /* Главная рабочая область */
        #screenContainer {
            flex: 1;
            position: relative;
            overflow: auto;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, #1c2541 0%, #0b132b 100%);
        }

        /* Полотно отрисовки матриц */
        #mainTreeDisplay {
            transform-origin: center center;
            transition: transform 0.2s ease-out;
            padding: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-width: max-content;
        }

        .matrices-row {
            display: flex;
            gap: 80px;
            justify-content: center;
            align-items: flex-start;
        }

        /* Стилизация Семерок */
        .semerka-matrix {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            background: rgba(28, 37, 65, 0.6);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #3a506b;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .matrix-row {
            display: flex;
            justify-content: center;
            gap: 30px;
            width: 100%;
        }

        /* Стилизация ячейки */
        .cell {
            width: 85px;
            height: 85px;
            border-radius: 10px;
            border: 2px dashed #3a506b;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 12px;
            background-color: rgba(11, 19, 43, 0.8);
            transition: all 0.3s ease;
            cursor: pointer;
            user-select: none;
            position: relative;
            box-sizing: border-box;
        }

        .cell-id {
            font-size: 10px;
            color: #6c7a89;
            margin-bottom: 4px;
        }

        .cell-user {
            font-weight: bold;
            color: #fff;
            max-width: 80px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* Цвета ячеек по уровням */
        .level-1 { border-color: #ff007f; }
        .level-2 { border-color: #00fff0; }
        .level-3 { border-color: #39ff14; }

        /* Заполненная ячейка */
        .cell.occupied {
            border-style: solid;
            background: linear-gradient(135deg, #1c2541 0%, #3a506b 100%);
            box-shadow: 0 0 10px rgba(0, 255, 240, 0.2);
        }

        /* Ячейка в фокусе (найденная поиском) */
        .cell.focused-cell {
            border-color: #ff3366 !important;
            box-shadow: 0 0 20px #ff3366 !important;
            background: #ff3366 !important;
            animation: pulse-border 1.5s infinite;
        }

        @keyframes pulse-border {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* Нижний тулбар управления масштабом */
        .toolbar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(28, 37, 65, 0.9);
            padding: 10px 20px;
            border-radius: 30px;
            border: 1px solid #00fff0;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 4px 20px rgba(0, 255, 240, 0.3);
            z-index: 10;
        }

        .toolbar label {
            font-size: 12px;
            color: #00fff0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .toolbar input[type="range"] {
            width: 150px;
            accent-color: #00fff0;
            cursor: pointer;
        }

        /* Стилизация полноэкранного оверлея таблицы */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(11, 19, 43, 0.95);
            z-index: 1000;
            display: none;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
        }

        .overlay.show {
            display: flex;
        }

        .overlay-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #00fff0;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        .overlay-title {
            font-size: 20px;
            color: #00fff0;
            font-weight: bold;
        }

        .overlay-close {
            background: #e43f5a;
            color: white;
            border: none;
            padding: 6px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        .table-container {
            flex: 1;
            overflow: auto;
            background: #1c2541;
            border-radius: 8px;
            border: 1px solid #3a506b;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid #3a506b;
            padding: 10px;
            text-align: left;
        }

        th {
            background: #0b132b;
            color: #00fff0;
            position: sticky;
            top: 0;
        }

        /* Стили реферального дерева внутри таблицы */
        .ref-node {
            display: flex;
            align-items: flex-start;
            margin-bottom: 6px;
            gap: 8px;
        }

        .user-card {
            padding: 6px;
            border-radius: 4px;
            min-width: 110px;
            max-width: 130px;
            box-sizing: border-box;
            transition: all 0.2s;
        }

        .children-container {
            display: flex;
            flex-direction: column;
            border-left: 1px dashed #00fff0;
            padding-left: 8px;
            gap: 4px;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Сайт 2: Матрицы</div>
        
        <div class="controls-wrapper">
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Поиск логина...">
                <button id="searchBtn">Найти</button>
            </div>

            <div class="menu-container">
                <button class="menu-btn" id="menuToggleBtn">☰</button>
                <div class="menu-content" id="menuContent">
                    <button id="openTableBtn">📊 Реферальная Таблица</button>
                </div>
            </div>
        </div>
    </header>

    <div id="screenContainer">
        <div id="mainTreeDisplay"></div>
    </div>

    <div class="toolbar">
        <label for="zoomSlider">Зум</label>
        <input type="range" id="zoomSlider" min="0.2" max="1.5" step="0.05" value="0.8">
        <button id="resetBtn" style="padding: 4px 10px; background: #e43f5a; border: none; color: white; border-radius: 4px; cursor: pointer;">Сброс БД</button>
    </div>

    <div id="tableOverlay" class="overlay">
        <div class="overlay-header">
            <div class="overlay-title">Реферальное Дерево</div>
            
            <div class="search-container">
                <input type="text" id="refSearchInput" placeholder="Искать реферала...">
                <button id="refSearchBtn">Поиск</button>
                <button id="refSearchResetBtn" style="background:#e43f5a; color:white;">Сброс</button>
            </div>

            <button class="overlay-close" id="closeOverlayBtn">Закрыть</button>
        </div>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th style="width: 100%;">Интерактивная структура связей от SYSTEM_ROOT</th>
                    </tr>
                </thead>
                <tbody id="interactiveRefTableBody">
                    </tbody>
            </table>
        </div>
    </div>

    <script src="matrix.js"></script>
    <script src="table.js"></script>
</body>
                    </html>
