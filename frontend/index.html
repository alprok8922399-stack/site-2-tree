<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>САЙТ 2 - Бинарная Матрица</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: #0b0b0e; color: #fff; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* Верхняя панель управления */
        .controls { background: #14141c; padding: 12px 15px; border-bottom: 2px solid #00bcd4; display: flex; flex-direction: column; gap: 10px; z-index: 10; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        .search-row { display: flex; gap: 10px; }
        .search-input { flex: 1; background: #1f1f2a; border: 2px solid #3f4456; border-radius: 8px; padding: 10px 14px; color: #fff; font-size: 16px; font-weight: bold; }
        .search-input:focus { border-color: #00bcd4; outline: none; }
        .zoom-row { display: flex; align-items: center; gap: 10px; font-size: 14px; color: #fff; font-weight: bold; }
        .zoom-slider { flex: 1; accent-color: #00bcd4; height: 8px; }

        /* Пространство холста матрицы */
        .viewport { flex: 1; position: relative; overflow: hidden; cursor: grab; background: radial-gradient(#2c2c3a 1px, transparent 1px); background-size: 30px 30px; }
        .viewport:active { cursor: grabbing; }
        .canvas { position: absolute; top: 0; left: 0; transform-origin: 0 0; padding: 200px; display: flex; flex-direction: column; align-items: center; gap: 50px; }

        /* Стилизация рядов и ячеек */
        .row { display: flex; justify-content: center; gap: 24px; position: relative; }
        
        /* БАЗОВАЯ ЯЧЕЙКА (Сделали крупнее, ярче и с жирным белым текстом) */
        .cell { background: #1e2235; border: 2px solid #00bcd4; border-radius: 10px; padding: 12px; width: 125px; text-align: center; box-shadow: 0 6px 16px rgba(0,0,0,0.6); transition: all 0.2s; position: relative; }
        .cell-id { font-weight: 900; color: #00ffcc; margin-bottom: 6px; display: block; font-size: 12px; letter-spacing: 1px; }
        .cell-login { font-weight: bold; color: #ffffff; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }

        /* Золотая ячейка FOUNDER А1 */
        #cell-cell-A1 { background: #ffb300 !important; border-color: #fff !important; box-shadow: 0 0 15px #ffb300 !important; }
        #cell-cell-A1 .cell-id { color: #fff !important; }
        #cell-cell-A1 .cell-login { color: #000 !important; }
        
        /* СТАТУС: АКТИВНАЯ ЯЧЕЙКА (Яркий сочный синий неон) */
        .cell.active { background: #0d47a1; border-color: #00ffcc; box-shadow: 0 0 12px rgba(0, 255, 204, 0.3); }
        
        /* СТАТУС: АРХИВНАЯ ЯЧЕЙКА (Потухшая, уходит на задний план, но текст разборчив) */
        .cell.archived { opacity: 0.4; background: #111420; border-color: #444; }
        .cell.archived .cell-id { color: #888; }
        .cell.archived .cell-login { color: #aaa; }

        /* СТАТУС: ПОДСВЕЧЕННАЯ ПОИСКОМ (Огненный взрыв) */
        .cell.highlight { border-color: #ff5722; box-shadow: 0 0 25px #ff5722; transform: scale(1.15); background: #bf360c; z-index: 5; }
        .cell.highlight .cell-id { color: #fff; }

        /* СТАТУС: ПУСТАЯ ОЖИДАЮЩАЯ ЯЧЕЙКА (Заметный пунктир, чтобы было видно куда встанет веер) */
        .cell.empty { border: 2px dashed #4e5573; background: rgba(30, 34, 53, 0.2); opacity: 0.8; }
        .cell.empty .cell-id { color: #4e5573; }
        .cell.empty .cell-login { color: #4e5573; font-weight: normal; font-size: 12px; }

        /* Нижний подвал: Живой Лог */
        .footer { background: #14141c; height: 180px; border-top: 2px solid #00bcd4; display: flex; flex-direction: column; z-index: 10; box-shadow: 0 -4px 20px rgba(0,0,0,0.5); }
        .stats-bar { background: #1f1f2a; padding: 8px 15px; font-size: 13px; display: flex; justify-content: space-between; color: #fff; font-weight: bold; border-bottom: 1px solid #2a2a35; }
        .log-stream { flex: 1; padding: 10px; overflow-y: auto; font-family: monospace; font-size: 12px; background: #050508; color: #00ff66; }
        .log-line { margin-bottom: 4px; border-bottom: 1px solid #111; padding-bottom: 4px; }
    </style>
</head>
<body>

    <div class="controls">
        <div class="search-row">
            <input type="text" id="searchInput" class="search-input" placeholder="🔍 Найти логин в матрице...">
        </div>
        <div class="zoom-row">
            <span>Зум:</span>
            <input type="range" id="zoomSlider" class="zoom-slider" min="0.1" max="2" step="0.05" value="1">
            <span id="zoomVal">1.0x</span>
        </div>
    </div>

    <div class="viewport" id="viewport">
        <div class="canvas" id="canvas"></div>
    </div>

    <div class="footer">
        <div class="stats-bar">
            <span id="statTotal">Всего в системе: 3</span>
            <span id="statTarget">Ожидание данных...</span>
        </div>
        <div class="log-stream" id="logStream">
            <div class="log-line">[Система]: Ожидание подключения к бэкенду матрицы...</div>
        </div>
    </div>

<script>
    const viewport = document.getElementById('viewport');
    const canvas = document.getElementById('canvas');
    const zoomSlider = document.getElementById('zoomSlider');
    const zoomVal = document.getElementById('zoomVal');
    const searchInput = document.getElementById('searchInput');
    const logStream = document.getElementById('logStream');
    const statTotal = document.getElementById('statTotal');
    const statTarget = document.getElementById('statTarget');

    const BACKEND_URL = 'https://site-2-tree.onrender.com/api/matrix';

    let zoom = 1;
    let panX = 50;
    let panY = 50;
    let isDragging = false;
    let startX, startY;
    let searchString = '';
    let prevDiff = -1;

    function updateTransform() {
        canvas.style.transform = `translate(${panX}px, ${panY}px) scale(${zoom})`;
    }

    viewport.addEventListener('pointerdown', (e) => {
        if(e.target.closest('.controls') || e.target.closest('.footer')) return;
        isDragging = true;
        startX = e.clientX - panX;
        startY = e.clientY - panY;
        viewport.setPointerCapture(e.pointerId);
    });

    viewport.addEventListener('pointermove', (e) => {
        if (!isDragging) return;
        panX = e.clientX - startX;
        panY = e.clientY - startY;
        updateTransform();
    });

    viewport.addEventListener('pointerup', (e) => {
        isDragging = false;
        viewport.releasePointerCapture(e.pointerId);
    });

    zoomSlider.addEventListener('input', (e) => {
        zoom = parseFloat(e.target.value);
        zoomVal.innerText = zoom.toFixed(1) + 'x';
        updateTransform();
    });

    viewport.addEventListener('touchstart', (e) => {
        if (e.targetTouches.length === 2) {
            prevDiff = Math.hypot(
                e.targetTouches[0].clientX - e.targetTouches[1].clientX,
                e.targetTouches[0].clientY - e.targetTouches[1].clientY
            );
        }
    });

    viewport.addEventListener('touchmove', (e) => {
        if (e.targetTouches.length === 2 && prevDiff > 0) {
            let curDiff = Math.hypot(
                e.targetTouches[0].clientX - e.targetTouches[1].clientX,
                e.targetTouches[0].clientY - e.targetTouches[1].clientY
            );
            let factor = curDiff / prevDiff;
            zoom = Math.min(Math.max(zoom * factor, 0.1), 2);
            zoomSlider.value = zoom;
            zoomVal.innerText = zoom.toFixed(1) + 'x';
            updateTransform();
            prevDiff = curDiff;
        }
    });

    viewport.addEventListener('touchend', () => { prevDiff = -1; });

    function renderMatrix(matrix) {
        canvas.innerHTML = '';
        const rowsToRender = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H'];
        const rowCounts = { 'A': 1, 'B': 2, 'C': 4, 'D': 8, 'E': 16, 'F': 32, 'G': 64, 'H': 128 };

        rowsToRender.forEach(letter => {
            const maxCells = rowCounts[letter];
            let hasAnyDataInRow = false;
            
            for (let i = 1; i <= maxCells; i++) {
                if (matrix[`${letter}${i}`]) {
                    hasAnyDataInRow = true;
                    break;
                }
            }
            
            if (!hasAnyDataInRow && letter !== 'A' && letter !== 'B' && letter !== 'C' && letter !== 'D') return;

            const rowDiv = document.createElement('div');
            rowDiv.className = 'row';

            for (let i = 1; i <= maxCells; i++) {
                const cellId = `${letter}${i}`;
                const cellData = matrix[cellId];
                
                const cellDiv = document.createElement('div');
                cellDiv.id = `cell-${cellId}`;
                
                if (cellData) {
                    cellDiv.className = `cell ${cellData.status || 'active'}`;
                    if (searchString && cellData.login.toLowerCase().includes(searchString.toLowerCase())) {
                        cellDiv.classList.add('highlight');
                    }
                    cellDiv.innerHTML = `<span class="cell-id">${cellId}</span><span class="cell-login">${cellData.login}</span>`;
                } else {
                    cellDiv.className = 'cell empty';
                    cellDiv.innerHTML = `<span class="cell-id">${cellId}</span><span class="cell-login">ожидание</span>`;
                }
                rowDiv.appendChild(cellDiv);
            }
            canvas.appendChild(rowDiv);
        });
    }

    searchInput.addEventListener('input', (e) => {
        searchString = e.target.value.trim();
        if(window.lastMatrixData) {
            renderMatrix(window.lastMatrixData);
            if(searchString) {
                for (let key in window.lastMatrixData) {
                    if(window.lastMatrixData[key].login.toLowerCase() === searchString.toLowerCase()) {
                        const targetEl = document.getElementById(`cell-${key}`);
                        if(targetEl) {
                            panX = (viewport.offsetWidth / 2) - targetEl.offsetLeft;
                            panY = 150;
                            updateTransform();
                        }
                    }
                }
            }
        }
    });

    async function fetchUpdate() {
        try {
            const response = await fetch(BACKEND_URL);
            const res = await response.json();
            window.lastMatrixData = res.matrix;
            renderMatrix(res.matrix);

            statTotal.innerText = `Всего в системе: ${res.totalUsers}`;
            statTarget.innerText = `Ряд: ${res.currentConfig.row} (круг ${res.currentConfig.round})`;

            logStream.innerHTML = '';
            res.logs.forEach(log => {
                const div = document.createElement('div');
                div.className = 'log-line';
                div.innerText = log;
                logStream.appendChild(div);
            });
        } catch (error) {
            console.error("Ошибка обновления:", error);
        }
    }

    fetchUpdate();
    setInterval(fetchUpdate, 1500);
    
    panX = window.innerWidth / 2 - 60;
    panY = 60;
    updateTransform();
</script>

</body>
</html>
