<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-Панель Матрицы</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Шапка с кнопками управления (бывшая левая панель) */
        header {
            background-color: #1e293b;
            padding: 15px 20px;
            border-bottom: 1px solid #334155;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            justify-content: space-between;
        }

        .header-title {
            font-size: 18px;
            font-weight: bold;
            color: #38bdf8;
        }

        .controls-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }

        input[type="text"] {
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid #475569;
            background-color: #0f172a;
            color: #fff;
            font-size: 14px;
            outline: none;
            width: 180px;
        }

        button {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }

        .btn-search {
            background-color: #38bdf8;
            color: #0f172a;
        }

        .btn-search:hover {
            background-color: #0ea5e9;
        }

        .btn-reset {
            background-color: #ef4444;
            color: white;
        }

        .btn-reset:hover {
            background-color: #dc2626;
        }

        .zoom-container {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #94a3b8;
        }

        /* Главная рабочая зона матрицы с прокруткой вбок */
        main {
            flex: 1;
            padding: 20px;
            overflow-x: auto;
            overflow-y: auto;
            display: flex;
            justify-content: flex-start;
            align-items: flex-start;
            min-height: 450px;
            background: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%);
        }

        #mainTreeDisplay {
            display: flex;
            transform-origin: left top;
            transition: transform 0.1s ease-out;
            padding-bottom: 40px;
        }

        /* Стили контейнера матриц-семерок */
        .matrices-row {
            display: flex;
            flex-direction: row;
            gap: 40px;
            align-items: flex-start;
        }

        .semerka-matrix {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            background: rgba(30, 41, 59, 0.5);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(51, 65, 85, 0.5);
        }

        .matrix-row {
            display: flex;
            justify-content: center;
            gap: 15px;
            width: 100%;
        }

        /* Ячейки */
        .cell {
            background-color: #334155;
            border: 2px solid #475569;
            border-radius: 8px;
            width: 85px;
            text-align: center;
            padding: 8px 4px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.3);
        }

        .cell:hover {
            transform: translateY(-2px);
            border-color: #38bdf8;
        }

        .cell.occupied {
            background: linear-gradient(135deg, #1e3a8a 0%, #0f172a 100%);
            border-color: #2563eb;
        }

        .cell.focused-cell {
            background: linear-gradient(135deg, #b91c1c 0%, #7f1d1d 100%) !important;
            border-color: #f43f5e !important;
            animation: pulse 1.5s infinite alternate;
        }

        .cell-id {
            font-size: 11px;
            font-weight: 800;
            color: #94a3b8;
            margin-bottom: 2px;
            text-transform: uppercase;
        }

        .cell-user {
            font-size: 12px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #fff;
        }

        /* Нижняя секция со списками пользователей */
        footer {
            background-color: #1e293b;
            border-top: 1px solid #334155;
            padding: 20px;
        }

        .table-container {
            max-width: 800px;
            margin: 0 auto;
            background-color: #0f172a;
            border-radius: 8px;
            border: 1px solid #334155;
            max-height: 300px;
            overflow-y: auto;
        }

        .table-title {
            font-size: 15px;
            font-weight: bold;
            color: #94a3b8;
            margin-bottom: 10px;
            text-align: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 14px;
        }

        th, td {
            padding: 10px 15px;
            border-bottom: 1px solid #334155;
        }

        th {
            background-color: #1e293b;
            color: #38bdf8;
            position: sticky;
            top: 0;
            font-weight: 600;
        }

        tr:hover td {
            background-color: rgba(56, 189, 248, 0.05);
            cursor: pointer;
        }

        @keyframes pulse {
            from { box-shadow: 0 0 4px #f43f5e; }
            to { box-shadow: 0 0 14px #f43f5e; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-title">M-Matrix Admin</div>
        
        <div class="controls-group">
            <input type="text" id="searchInput" placeholder="Поиск логина...">
            <button id="searchBtn" class="btn-search">Найти</button>
        </div>

        <div class="controls-group">
            <div class="zoom-container">
                <span>Масштаб:</span>
                <input type="range" id="zoomSlider" min="0.1" max="1.5" step="0.05" value="1">
            </div>
            <button id="resetBtn" class="btn-reset">Сбросить дерево</button>
        </div>
    </header>

    <main>
        <div id="mainTreeDisplay">
            </div>
    </main>

    <footer>
        <div class="table-title">Список зарегистрированных и оплативших участников (по ячейкам)</div>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Логин</th>
                        <th>Ячейка</th>
                    </tr>
                </thead>
                <tbody id="refTableBody">
                    <tr>
                        <td colspan="2" style="text-align: center; color: #64748b;">Загрузка данных...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
