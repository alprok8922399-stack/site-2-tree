<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Секретная Матрица (Сайт №2)</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #1a252f;
            color: #ecf0f1;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
        }
        h1 {
            color: #3498db;
            margin-bottom: 5px;
            font-size: 24px;
        }
        .subtitle {
            color: #7f8c8d;
            margin-bottom: 25px;
            font-size: 14px;
        }
        .controls {
            margin-bottom: 30px;
        }
        .btn-reset {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 14px;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-reset:hover {
            background-color: #c0392b;
        }
        /* Сетка для отображения 3-уровневых домиков на одном горизонте */
        .matrix-horizon {
            display: flex;
            flex-wrap: wrap;
            gap: 40px;
            justify-content: center;
            width: 100%;
            max-width: 1200px;
        }
        /* Стилизация одного независимого домика семерки 1-2-4 */
        .house {
            background: #2c3e50;
            border: 2px solid #34495e;
            border-radius: 12px;
            padding: 20px;
            width: 280px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }
        .house-title {
            font-size: 12px;
            color: #f1c40f;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            font-weight: bold;
        }
        .level-row {
            display: flex;
            justify-content: center;
            width: 100%;
            margin-bottom: 12px;
            gap: 15px;
        }
        .level-row:last-child {
            margin-bottom: 0;
            background: rgba(46, 204, 113, 0.1);
            padding: 8px;
            border-radius: 8px;
            border: 1px dashed #2ecc71;
        }
        .cell {
            background: #34495e;
            border: 2px solid #7f8c8d;
            border-radius: 8px;
            width: 50px;
            height: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: bold;
            position: relative;
            transition: all 0.3s ease;
        }
        .cell.occupied {
            background: #2980b9;
            border-color: #3498db;
        }
        .cell.payout-row.occupied {
            background: #27ae60;
            border-color: #2ecc71;
            animation: pulse 0.5s ease-in-out;
        }
        .cell-label {
            color: #bdc3c7;
            font-size: 9px;
            margin-bottom: 2px;
        }
        .cell-user {
            color: white;
            max-width: 46px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .cell.empty {
            border-style: dashed;
            background: #2c3e50;
            opacity: 0.4;
        }
        .cell.empty .cell-user {
            color: #7f8c8d;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <h1>🔒 Приватная Панель Бухгалтерии</h1>
    <div class="subtitle">Модель 1-2-4 • Динамический горизонт активных матриц</div>

    <div class="controls">
        <button class="btn-reset" id="resetBtn">Очистить всю систему</button>
    </div>

    <div class="matrix-horizon" id="horizon">
        <div style="color: #7f8c8d;">Загрузка структуры матриц...</div>
    </div>

<script>
    // Автоматически берем домен бэкенда, на котором запущен фронт
    const API_URL = window.location.origin;

    async function updateMatrixView() {
        try {
            const response = await fetch(`${API_URL}/api/tree`);
            if (!response.ok) throw new Error('Ошибка сети');
            const treeDB = await response.json();
            
            renderHorizon(treeDB);
        } catch (err) {
            console.error(err);
            document.getElementById('horizon').innerHTML = `<div style="color: #e74c3c;">Ошибка обновления данных: ${err.message}</div>`;
        }
    }

    // Логика нарезки глобального бинарного дерева на локальные домики 1-2-4
    function renderHorizon(tree) {
        const horizon = document.getElementById('horizon');
        horizon.innerHTML = '';

        // Список индексов вершин домиков, которые мы хотим выводить на экран.
        // Изначально на выплате стоит ячейка 1 (A1).
        let activeVertices = [1];

        // Если ячейка 1 закрыла свой низ (ряд C: индексы 4,5,6,7), то по ТЗ этот домик уходит в архив.
        // Вершинами новых домиков на экране становятся участники из ряда C (индексы 4, 5, 6, 7).
        const isRootClosed = [4, 5, 6, 7].every(idx => tree[idx] && tree[idx].user);
        if (isRootClosed) {
            activeVertices = [4, 5, 6, 7];
            
            // Если все вершины 4,5,6,7 тоже закрыли свои выплатные ряды (индексы 16-31, ряд E),
            // сдвигаем горизонт еще ниже — вершинами становятся индексы 8-15 (ряд D) и так далее.
            const isRowCClosed = Array.from({length: 8}, (_, i) => 8 + i).every(idx => tree[idx] && tree[idx].user);
            if (isRowCClosed) {
                activeVertices = Array.from({length: 8}, (_, i) => 8 + i);
            }
        }

        // Отрисовываем каждый активный домик на экране
        activeVertices.forEach(vIdx => {
            // Рассчитываем индексы элементов локальной семерки 1-2-4 на основе индекса вершины бинара
            const leftChild = vIdx * 2;
            const rightChild = vIdx * 2 + 1;
            
            const payout1 = leftChild * 2;
            const payout2 = leftChild * 2 + 1;
            const payout3 = rightChild * 2;
            const payout4 = rightChild * 2 + 1;

            const houseHtml = `
                <div class="house">
                    <div class="house-title">Домик #${tree[vIdx]?.label || vIdx}</div>
                    
                    <div class="level-row">
                        ${createCellHtml(tree, vIdx, 'top')}
                    </div>
                    
                    <div class="level-row">
                        ${createCellHtml(tree, leftChild, 'shoulder')}
                        ${createCellHtml(tree, rightChild, 'shoulder')}
                    </div>
                    
                    <div class="level-row">
                        ${createCellHtml(tree, payout1, 'payout')}
                        ${createCellHtml(tree, payout2, 'payout')}
                        ${createCellHtml(tree, payout3, 'payout')}
                        ${createCellHtml(tree, payout4, 'payout')}
                    </div>
                </div>
            `;
            horizon.insertAdjacentHTML('beforeend', houseHtml);
        });
    }

    // Вспомогательная функция генерации HTML одной ячейки
    function createCellHtml(tree, idx, type) {
        const node = tree[idx];
        const isOccupied = node && node.user;
        const userDisplay = isOccupied ? node.user : 'пусто';
        
        // Автоматически генерируем красивую текстовую метку (A1, B1, C1...), если ячейки еще нет в базе
        let label = node?.label;
        if (!label) {
            const row = Math.floor(Math.log2(idx));
            const letter = String.fromCharCode(65 + row);
            const startIdx = Math.pow(2, row);
            label = `${letter}${idx - startIdx + 1}`;
        }

        let classes = 'cell';
        if (isOccupied) classes += ' occupied';
        if (!isOccupied) classes += ' empty';
        if (type === 'payout') classes += ' payout-row';
        if (type === 'payout' && isOccupied) classes += ' occupied';

        return `
            <div class="${classes}">
                <div class="cell-label">${label}</div>
                <div class="cell-user">${userDisplay}</div>
            </div>
        `;
    }

    // Логика кнопки сброса системы
    document.getElementById('resetBtn').addEventListener('click', async () => {
        if (confirm('Вы уверены, что хотите полностью очистить матрицы и балансы?')) {
            await fetch(`${API_URL}/api/reset`, { method: 'POST' });
            updateMatrixView();
        }
    });

    // Запуск автообновления экрана каждые 2 секунды, чтобы видеть работу робота
    updateMatrixView();
    setInterval(updateMatrixView, 2000);
</script>
</body>
</html>
