<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мониторинг Матриц 7-К</title>
    <style>
        body {
            background-color: #1a1a2e;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            user-select: none; 
            -webkit-user-select: none;
        }
        h1 { margin: 5px 0; font-size: 20px; text-shadow: 0 0 10px #00fff0; }
        
        .control-panel {
            background: #162447;
            padding: 10px;
            border-radius: 8px;
            width: 100%;
            max-width: 500px;
            box-sizing: border-box;
            margin-bottom: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            position: relative;
            z-index: 10;
        }

        /* Кнопка выпадающего меню управления */
        .menu-btn {
            background-color: #0f4c81;
            color: white;
            border: none;
            padding: 10px 15px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 10px;
            transition: background 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        .menu-btn:hover {
            background-color: #1f4068;
        }

        /* Выпадающая шторка меню */
        .menu-content {
            display: none;
            background: #1f4068;
            border: 1px solid #0f4c81;
            border-radius: 6px;
            padding: 10px;
            margin-bottom: 10px;
            box-sizing: border-box;
        }
        .menu-content.show {
            display: block;
        }
        .menu-item-btn {
            background-color: #e43f5a;
            color: white;
            border: none;
            padding: 8px 12px;
            font-size: 14px;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            text-align: left;
            font-weight: bold;
            transition: background 0.2s;
        }
        .menu-item-btn:hover {
            background-color: #ff3366;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        .search-box input {
            flex: 1;
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #0f4c81;
            background: #1f4068;
            color: #fff;
            font-size: 16px;
        }
        .search-box button {
            padding: 8px 15px;
            background: #e43f5a;
            border: none;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        .slider-zone {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            font-size: 14px;
        }
        .slider-zone input { flex: 1; }
        .btn-reset {
            background: #438a5e;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
        }

        /* Главный контейнер матриц */
        .screen-container {
            width: 100%;
            max-width: 100vw;
            overflow-x: auto; 
            overflow-y: auto; 
            display: block;   
            background: #111122;
            border-radius: 8px;
            min-height: 450px;
            box-sizing: border-box;
            cursor: zoom-in;
            padding: 20px;
        }
        
        #mainTreeDisplay {
            transform-origin: top left;
            transition: transform 0.25s cubic-bezier(0.25, 1, 0.5, 1);
            display: block;
            width: max-content; 
        }
        
        .matrices-row {
            display: grid !important;
            grid-template-columns: repeat(32, 260px) !important; 
            gap: 30px;
            padding: 10px;
            box-sizing: border-box;
        }

        .semerka-matrix {
            background: rgba(22, 36, 71, 0.9);
            border: 2px solid #0f4c81;
            border-radius: 12px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
            min-width: 260px;
            max-width: 260px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            cursor: default;
        }
        .matrix-row {
            display: flex;
            justify-content: center;
            gap: 12px;
            width: 100%;
        }
        
        .cell {
            background: #1f4068;
            border: 1px solid #0f4c81;
            border-radius: 6px;
            padding: 6px;
            text-align: center;
            min-width: 55px;
            box-sizing: border-box;
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .cell:active { transform: scale(0.9) !important; }
        .cell-id { font-size: 10px; color: #888; font-weight: bold; }
        .cell-user { font-size: 13px; font-weight: bold; overflow: hidden; text-overflow: ellipsis; }
        
        .level-1 { border: 2px solid #ffd700; background: #3a3000; } 
        .level-2 { border: 2px solid #00fff0; background: #002b36; } 
        .level-3 { border: 1px dashed #ffffff; background: #2b2b2b; } 
        
        .occupied { background: #16a085 !important; border-color: #1abc9c !important; }
        .focused-cell { animation: pulse 1s infinite alternate; border-color: #ff3366 !important; box-shadow: 0 0 15px #ff3366 !important; background: #ff3366 !important; }

        @keyframes pulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.05); }
        }

        /* Полноэкранный overlay для Новой Реферальной Таблицы */
        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(26, 26, 46, 0.98);
            color: #fff;
            z-index: 9999;
            padding: 20px;
            box-sizing: border-box;
            overflow-y: auto;
        }
        .overlay.show {
            display: block;
        }
        .overlay-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 100%;
            margin: 0 auto 20px auto;
            border-bottom: 2px solid #00fff0;
            padding-bottom: 10px;
        }
        .overlay-title {
            font-size: 18px;
            font-weight: bold;
            color: #00fff0;
            text-shadow: 0 0 5px rgba(0,255,240,0.5);
        }
        .close-overlay-btn {
            background-color: #e43f5a;
            color: white;
            border: none;
            padding: 6px 14px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
        }
        .close-overlay-btn:hover {
            background-color: #ff3366;
        }
        
        /* Широкий горизонтальный контейнер для многоколоночной матрешки */
        .table-container {
            width: 100%;
            overflow-x: auto; /* Включаем горизонтальный скролл */
            background: #162447;
            border-radius: 8px;
            padding: 15px;
            box-sizing: border-box;
            -webkit-overflow-scrolling: touch; /* Плавный скролл пальцем на iOS */
        }
        
        .ref-table {
            width: max-content; /* Заставляем таблицу растягиваться по ширине контента */
            border-collapse: separate;
            border-spacing: 15px 0px; /* Отступы между колонками рефералов */
            font-size: 15px;
        }
        
        /* Фиксируем жесткий размер заголовка и запрещаем сжатие */
        .ref-table th {
            background: #0f4c81;
            color: white;
            padding: 12px;
            text-align: left;
            border-radius: 6px;
            font-weight: bold;
            position: relative;
            cursor: pointer;
            user-select: none;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            width: 240px;
            min-width: 240px;
            max-width: 240px;
            box-sizing: border-box;
        }
        
        /* Иконка стрелочки вниз в заголовке */
        .header-arrow {
            float: right;
            transition: transform 0.2s;
            color: #00fff0;
        }
        .header-arrow.collapsed {
            transform: rotate(-90deg); /* Свёрнуто вбок */
        }

        /* Строго настраиваем ячейки колонок */
        .ref-table td {
            padding: 0;
            vertical-align: top;
            width: 240px;
            min-width: 240px;
            max-width: 240px;
            box-sizing: border-box;
        }

        /* Контейнер списка рефералов внутри колонки */
        .referrals-column-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 10px;
            width: 100%;
            box-sizing: border-box;
        }
        .referrals-column-list.hidden {
            display: none !important;
        }

        /* Стили плашки пользователя внутри списка */
        .user-row-card {
            background: #1f4068;
            border: 1px solid #0f4c81;
            padding: 10px;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
            box-sizing: border-box;
            width: 100%;
        }
        .user-row-card:hover {
            background: #244d7d;
            border-color: #00fff0;
        }
        .user-row-card.active-branch {
            border-color: #00fff0;
            background: #113054;
            box-shadow: 0 0 8px rgba(0,255,240,0.2);
        }
        .user-info-text {
            display: flex;
            flex-direction: column;
            gap: 2px;
            overflow: hidden;
            width: calc(100% - 25px); /* Защита от выламывания длинных имен */
        }
        .user-name {
            font-weight: bold;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .user-cell-badge {
            font-size: 11px;
            color: #888;
        }
        .row-arrow {
            color: #00fff0;
            font-weight: bold;
            font-size: 16px;
            flex-shrink: 0;
        }
    </style>
</head>
<body>

    <h1>Панель Управления Админа</h1>

    <div class="control-panel">
        <button class="menu-btn" id="menuToggleBtn">☰ Меню Управления ▼</button>
        
        <div class="menu-content" id="menuContent">
            <button class="menu-item-btn" id="openTableBtn">➔ Цепочка рефералов</button>
        </div>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Введите логин пользователя...">
            <button id="searchBtn">Найти</button>
        </div>
        <div class="slider-zone">
            <span>Масштаб:</span>
            <input type="range" id="zoomSlider" min="0.03" max="1" step="0.05" value="0.8">
            <button class="btn-reset" id="resetBtn">Сброс БД</button>
        </div>
    </div>

    <div class="screen-container" id="screenContainer">
        <div id="mainTreeDisplay"></div>
    </div>

    <div class="overlay" id="tableOverlay">
        <div class="overlay-header">
            <div class="overlay-title">📋 ИНТЕРАКТИВНАЯ ЦЕПОЧКА РЕФЕРАЛОВ</div>
            <button class="close-overlay-btn" id="closeOverlayBtn">Закрыть ✖</button>
        </div>
        <div class="table-container">
            <table class="ref-table">
                <thead>
                    <tr id="refTableHeaders"></tr>
                </thead>
                <tbody>
                    <tr id="refTableColumnsBody"></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
