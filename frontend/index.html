<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.4, minimum-scale=0.1, maximum-scale=5.0, user-scalable=yes">
    <title>Панель Admina — Динамические Матрицы 1-2-4</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1a1a24;
            color: #fff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        h1 {
            font-size: 22px;
            color: #00cbc6;
            margin-bottom: 10px;
        }
        .controls {
            margin-bottom: 25px;
            width: 100%;
            max-width: 500px;
        }
        .btn-reset {
            background-color: #ff5e57;
            color: white;
            border: none;
            padding: 10px 15px;
            font-size: 14px;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
        }
        .scroll-wrapper {
            width: 100%;
            overflow: auto;
            display: block;
            padding: 20px 0;
        }
        .tree-container {
            display: flex;
            flex-direction: column;
            gap: 30px;
            align-items: center;
            width: max-content;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* Контейнер для выстраивания СЕМЕРОК в один ряд */
        .matrices-row {
            display: flex;
            justify-content: center;
            gap: 50px; /* Большой зазор МЕЖДУ отдельными домиками */
        }

        /* ЕДИНЫЙ ДОМИК - СЕМЕРКА (Абсолютная копия стиля первоначальной матрицы А1) */
        .semerka-matrix {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid #2c2c3e;
            border-radius: 12px;
            padding: 20px;
        }

        /* Строки внутри семерки */
        .matrix-row {
            display: flex;
            justify-content: center;
            gap: 12px; /* Идеально ОДИНАКОВЫЕ и ровные интервалы во всех рядах семерки */
        }

        /* СТИЛИ ЯЧЕЕК - СТРОГО КАК У А1 */
        .cell {
            background: #2c2c3e;
            border: 2px solid #3e3e56;
            border-radius: 8px;
            padding: 10px;
            width: 75px;
            text-align: center;
            font-size: 11px;
            box-sizing: border-box;
            flex-shrink: 0;
            transition: all 0.3s ease;
        }
        
        /* Цвета уровней внутри ЛЮБОЙ матрицы (копии А1) */
        .cell.level-1 {
            background: #ffd700; /* Золотая вершина */
            border-color: #b8860b;
            color: #000;
        }
        .cell.level-1 .cell-id { color: #000; }
        .cell.level-1 .cell-user { color: #111; }

        .cell.level-2 {
            background: #1e90ff; /* Синие плечи */
            border-color: #0000ff;
            color: #fff;
        }
        .cell.level-2 .cell-id { color: #fff; }
        .cell.level-2 .cell-user { color: #f0f0f0; }

        .cell.level-3 {
            background: #2c2c3e; /* Серый низ по умолчанию */
            border-color: #3e3e56;
        }

        /* Когда ячейка занимается пользователем */
        .cell.occupied.level-3 {
            border-color: #05c46b; /* Зеленый контур заполнения */
        }

        .cell-id {
            font-weight: bold;
            color: #00cbc6;
            margin-bottom: 4px;
            font-size: 12px;
        }
        .cell-user {
            color: #d2dae2;
            word-break: break-all;
            min-height: 14px;
        }
    </style>
</head>
<body>

    <h1>📊 Мониторинг Активных Матриц 1-2-4</h1>
    
    <div class="controls">
        <button class="btn-reset" id="resetBtn">Сбросить дерево (Очистить БД)</button>
        <input type="range" id="zoomSlider" min="0.1" max="1.5" step="0.05" value="0.7" style="width: 100%; margin-top: 15px;">
    </div>

    <div class="scroll-wrapper">
        <div class="tree-container" id="mainTreeDisplay">
            </div>
    </div>

<script src="script.js"></script>
</body>
</html>
