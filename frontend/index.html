<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Секретная Матрица (Сайт №2)</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #1a252f;
            color: #ecf0f1;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
        }
        h1 {
            color: #3498db;
            margin-bottom: 5px;
            font-size: 24px;
        }
        .subtitle {
            color: #7f8c8d;
            margin-bottom: 25px;
            font-size: 14px;
        }
        .controls {
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            background: #2c3e50;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #34495e;
        }
        .zoom-container {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
        }
        .btn-reset {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 14px;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-reset:hover {
            background-color: #c0392b;
        }
        /* Контейнер трансформации масштаба */
        .matrix-wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
            transform-origin: top center;
            transition: transform 0.1s ease-out;
        }
        .matrix-horizon {
            display: flex;
            flex-wrap: wrap;
            gap: 40px;
            justify-content: center;
            width: 100%;
            max-width: 1200px;
        }
        .house {
            background: #2c3e50;
            border: 2px solid #34495e;
            border-radius: 12px;
            padding: 20px;
            width: 280px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }
        .house-title {
            font-size: 12px;
            color: #f1c40f;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            font-weight: bold;
        }
        .level-row {
            display: flex;
            justify-content: center;
            width: 100%;
            margin-bottom: 12px;
            gap: 15px;
        }
        .level-row:last-child {
            margin-bottom: 0;
            background: rgba(46, 204, 113, 0.1);
            padding: 8px;
            border-radius: 8px;
            border: 1px dashed #2ecc71;
        }
        .cell {
            background: #34495e;
            border: 2px solid #7f8c8d;
            border-radius: 8px;
            width: 50px;
            height: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        .cell.occupied {
            background: #2980b9;
            border-color: #3498db;
        }
        .cell.payout-row.occupied {
            background: #27ae60;
            border-color: #2ecc71;
        }
        .cell-label {
            color: #bdc3c7;
            font-size: 9px;
            margin-bottom: 2px;
        }
        .cell-user {
            color: white;
            max-width: 46px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .cell.empty {
            border-style: dashed;
            background: #2c3e50;
            opacity: 0.4;
        }
    </style>
</head>
<body>

    <h1>🔒 Приватная Панель Бухгалтерии</h1>
    <div class="subtitle">Модель 1-2-4 • Динамический горизонт активных матриц</div>

    <div class="controls">
        <div class="zoom-container">
            <label for="zoomRange">Масштаб (в точку):</label>
            <input type="range" id="zoomRange" min="0.1" max="1.5" step="0.05" value="1">
            <span id="zoomVal">1.0x</span>
        </div>
        <button class="btn-reset" id="resetBtn">Очистить всю систему</button>
    </div>

    <div class="matrix-wrapper" id="wrapper">
        <div class="matrix-horizon" id="horizon">
            <div style="color: #7f8c8d;">Загрузка структуры матриц...</div>
        </div>
    </div>

<script>
    const API_URL = window.location.origin;

    // Управление ползунком масштаба
    const zoomRange = document.getElementById('zoomRange');
    const zoomVal = document.getElementById('zoomVal');
    const wrapper = document.getElementById('wrapper');

    zoomRange.addEventListener('input', (e) => {
        const val = e.target.value;
        zoomVal.innerText = `${val}x`;
        wrapper.style.transform = `scale(${val})`;
    });

    async function updateMatrixView() {
        try {
            const response = await fetch(`${API_URL}/api/tree`);
            if (!response.ok) throw new Error('Ошибка сети');
            const treeDB = await response.json();
            renderHorizon(treeDB);
        } catch (err) {
            console.error(err);
            document.getElementById('horizon').innerHTML = `<div style="color: #e74c3c;">Ошибка обновления: ${err.message}</div>`;
        }
    }

    function renderHorizon(tree) {
        const horizon = document.getElementById('horizon');
        horizon.innerHTML = '';

        let activeVertices = [1];
        const isRootClosed = [4, 5, 6, 7].every(idx => tree[idx] && tree[idx].user);
        
        if (isRootClosed) {
            activeVertices = [4, 5, 6, 7];
            const isRowCClosed = Array.from({length: 8}, (_, i) => 8 + i).every(idx => tree[idx] && tree[idx].user);
            if (isRowCClosed) {
                activeVertices = Array.from({length: 8}, (_, i) => 8 + i);
            }
        }

        activeVertices.forEach(vIdx => {
            const leftChild = vIdx * 2;
            const rightChild = vIdx * 2 + 1;
            
            const payout1 = leftChild * 2;
            const payout2 = leftChild * 2 + 1;
            const payout3 = rightChild * 2;
            const payout4 = rightChild * 2 + 1;

            const houseHtml = `
                <div class="house">
                    <div class="house-title">Домик #${tree[vIdx]?.label || vIdx}</div>
                    <div class="level-row">
                        ${createCellHtml(tree, vIdx, 'top')}
                    </div>
                    <div class="level-row">
                        ${createCellHtml(tree, leftChild, 'shoulder')}
                        ${createCellHtml(tree, rightChild, 'shoulder')}
                    </div>
                    <div class="level-row">
                        ${createCellHtml(tree, payout1, 'payout')}
                        ${createCellHtml(tree, payout2, 'payout')}
                        ${createCellHtml(tree, payout3, 'payout')}
                        ${createCellHtml(tree, payout4, 'payout')}
                    </div>
                </div>
            `;
            horizon.insertAdjacentHTML('beforeend', houseHtml);
        });
    }

    function createCellHtml(tree, idx, type) {
        const node = tree[idx];
        const isOccupied = node && node.user;
        const userDisplay = isOccupied ? node.user : 'пусто';
        
        let label = node?.label;
        if (!label) {
            const row = Math.floor(Math.log2(idx));
            const letter = String.fromCharCode(65 + row);
            const startIdx = Math.pow(2, row);
            label = `${letter}${idx - startIdx + 1}`;
        }

        let classes = 'cell';
        if (isOccupied) classes += ' occupied';
        if (!isOccupied) classes += ' empty';
        if (type === 'payout') classes += ' payout-row';

        return `
            <div class="${classes}">
                <div class="cell-label">${label}</div>
                <div class="cell-user">${userDisplay}</div>
            </div>
        `;
    }

    document.getElementById('resetBtn').addEventListener('click', async () => {
        if (confirm('Очистить всю систему?')) {
            await fetch(`${API_URL}/api/reset`, { method: 'POST' });
            updateMatrixView();
        }
    });

    updateMatrixView();
    setInterval(updateMatrixView, 2000);
</script>
</body>
</html>
