<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мониторинг Матриц 7-К (Admin Panel)</title>
    <style>
        body { background-color: #1a1a2e; color: #ffffff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; user-select: none; -webkit-user-select: none; }
        h1 { margin: 5px 0; font-size: 20px; text-shadow: 0 0 10px #00fff0; }
        .control-panel { background: #162447; padding: 10px; border-radius: 8px; width: 100%; max-width: 500px; box-sizing: border-box; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); position: relative; z-index: 10; }
        .menu-btn { background-color: #0f4c81; color: white; border: none; padding: 10px 15px; font-size: 15px; font-weight: bold; border-radius: 6px; cursor: pointer; width: 100%; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .menu-content { display: none; background: #1f4068; border: 1px solid #0f4c81; border-radius: 6px; padding: 10px; margin-bottom: 10px; }
        .menu-content.show { display: block; }
        .menu-item-btn { background-color: #e43f5a; color: white; border: none; padding: 8px 12px; font-size: 14px; border-radius: 4px; cursor: pointer; width: 100%; text-align: left; font-weight: bold; }
        .search-box { display: flex; gap: 10px; margin-bottom: 10px; }
        .search-box input { flex: 1; padding: 8px; border-radius: 5px; border: 1px solid #0f4c81; background: #1f4068; color: #fff; font-size: 16px; }
        .search-box button { padding: 8px 15px; background: #e43f5a; border: none; color: white; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .slider-zone { display: flex; align-items: center; justify-content: space-between; gap: 10px; font-size: 14px; }
        .btn-reset { background: #438a5e; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
        .workspace { display: flex; width: 100%; box-sizing: border-box; }
        .screen-container { flex: 1; width: 100%; max-width: 100vw; overflow-x: auto; overflow-y: auto; background: #111122; border-radius: 8px; min-height: 500px; padding: 20px; box-sizing: border-box; }
        #mainTreeDisplay { transform-origin: top left; transition: transform 0.25s cubic-bezier(0.25, 1, 0.5, 1); display: block; width: max-content; }
        .matrices-row { display: grid !important; grid-template-columns: repeat(32, 260px) !important; gap: 30px; padding: 10px; }
        .semerka-matrix { background: rgba(22, 36, 71, 0.9); border: 2px solid #0f4c81; border-radius: 12px; padding: 12px; display: flex; flex-direction: column; gap: 12px; align-items: center; min-width: 260px; max-width: 260px; }
        .matrix-row { display: flex; justify-content: center; gap: 12px; width: 100%; }
        .cell { background: #1f4068; border: 1px solid #0f4c81; border-radius: 6px; padding: 6px; text-align: center; min-width: 55px; cursor: pointer; }
        .level-1 { border: 2px solid #ffd700; background: #3a3000; } 
        .level-2 { border: 2px solid #00fff0; background: #002b36; } 
        .level-3 { border: 1px dashed #ffffff; background: #2b2b2b; } 
        .occupied { background: #16a085 !important; border-color: #1abc9c !important; }
        .focused-cell { border-color: #ff3366 !important; box-shadow: 0 0 15px #ff3366 !important; background: #ff3366 !important; }
    </style>
</head>
<body>
    <h1>Панель Управления Admin</h1>
    <div class="control-panel">
        <button class="menu-btn" id="menuToggleBtn">☰ Меню Управления <span>▼</span></button>
        <div class="menu-content" id="menuContent">
            <button class="menu-item-btn" id="openTableBtn">➔ Таблица рефералов</button>
        </div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Поиск в Матрицах (логин)...">
            <button id="searchBtn">Найти</button>
        </div>
        <div class="slider-zone">
            <span>Масштаб:</span>
            <input type="range" id="zoomSlider" min="0.03" max="1" step="0.05" value="0.8">
            <button class="btn-reset" id="resetBtn">Сброс БД</button>
        </div>
    </div>
    <div class="workspace">
        <div class="screen-container" id="screenContainer">
            <div id="mainTreeDisplay"></div>
        </div>
    </div>
    <script src="script.js"></script>
    <script src="matrix.js"></script>
</body>
</html>
