<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Секретная Админка Матрицы</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #1a1c23;
            color: #e2e8f0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Левая панель управления */
        .sidebar {
            width: 320px;
            background: #242631;
            border-right: 1px solid #323545;
            display: flex;
            flex-direction: column;
            padding: 20px;
            z-index: 10;
            box-shadow: 4px 0 15px rgba(0,0,0,0.3);
        }

        h2 {
            margin-top: 0;
            font-size: 20px;
            color: #4c9aff;
            text-align: center;
            border-bottom: 2px solid #323545;
            padding-bottom: 15px;
        }

        .control-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="text"], input[type="range"] {
            width: 100%;
            padding: 10px;
            background: #1a1c23;
            border: 1px solid #4a4f68;
            border-radius: 6px;
            color: #fff;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 12px;
            font-size: 14px;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 8px;
            transition: all 0.2s ease;
        }

        .btn-primary { background: #3b82f6; color: white; }
        .btn-primary:hover { background: #2563eb; }
        
        .btn-success { background: #10b981; color: white; }
        .btn-success:hover { background: #059669; }
        
        .btn-danger { background: #ef4444; color: white; }
        .btn-danger:hover { background: #dc2626; }

        /* Лог автомата */
        .log-container {
            flex: 1;
            margin-top: 15px;
            background: #1a1c23;
            border: 1px solid #323545;
            border-radius: 6px;
            padding: 10px;
            font-family: monospace;
            font-size: 12px;
            overflow-y: auto;
            white-space: pre-wrap;
            line-height: 1.5;
        }

        .info { color: #f59e0b; }
        .succ { color: #10b981; }
        .err { color: #ef4444; }

        /* Правая область с деревом */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            background: #15171e;
        }

        /* Табличный список (справа вверху) */
        .table-panel {
            background: #242631;
            border-bottom: 1px solid #323545;
            max-height: 180px;
            overflow-y: auto;
            padding: 10px;
        }

        .ref-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        .ref-table th, .ref-table td {
            border: 1px solid #323545;
            padding: 6px 10px;
            text-align: left;
        }

        .ref-table th { background: #1a1c23; color: #94a3b8; }
        .ref-table tr:hover { background: #2d303e; cursor: pointer; }

        /* Контейнер интерактивной матрицы */
        .tree-viewport {
            flex: 1;
            overflow: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .tree-wrapper {
            transform-origin: center center;
            transition: transform 0.1s ease-out;
        }

        /* Стили отрисовки Семерок */
        .matrices-row {
            display: flex;
            gap: 50px;
            justify-content: center;
            align-items: flex-start;
        }

        .semerka-matrix {
            background: #242631;
            border: 2px solid #3b82f6;
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }

        .matrix-row {
            display: flex;
            gap: 15px;
            justify-content: center;
            width: 100%;
        }

        .cell {
            width: 80px;
            height: 70px;
            background: #1a1c23;
            border: 1px solid #4a4f68;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .cell:hover {
            border-color: #3b82f6;
            background: #282b3d;
        }

        .cell-id {
            font-weight: bold;
            color: #94a3b8;
            margin-bottom: 2px;
        }

        .cell-user {
            color: #fff;
            max-width: 75px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* Статусы ячеек */
        .cell.occupied {
            background: #1e3a8a;
            border-color: #3b82f6;
        }
        .cell.occupied .cell-id { color: #60a5fa; }

        .cell.focused-cell {
            background: #ec4899 !important;
            border-color: #f472b6 !important;
            box-shadow: 0 0 15px #ec4899;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .level-1 { border-width: 2px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>🌲 АДМИНКА МАТРИЦЫ</h2>
        
        <div class="control-group">
            <label for="searchInput">Поиск логина:</label>
            <input type="text" id="searchInput" placeholder="Введите логин...">
            <button id="searchBtn" class="btn-primary">Найти и сфокусировать</button>
        </div>

        <div class="control-group">
            <label for="zoomSlider">Масштаб карты:</label>
            <input type="range" id="zoomSlider" min="0.3" max="2" step="0.1" value="1">
        </div>

        <div class="control-group" style="border-top: 1px solid #323545; padding-top: 15px;">
            <label>Тест покупок (Робот):</label>
            <button id="startBtn" class="btn-success">Запустить регистрацию</button>
            <button id="stopBtn" class="btn-danger" style="display: none;">Остановить робота</button>
        </div>

        <div class="control-group" style="margin-top: auto;">
            <button id="resetBtn" class="btn-danger">Очистить базу данных</button>
        </div>

        <label>Лог действий:</label>
        <div id="log" class="log-container">> Ожидание запуска...</div>
    </div>

    <div class="main-content">
        
        <div class="table-panel">
            <table class="ref-table">
                <thead>
                    <tr>
                        <th>Покупатель в магазине</th>
                        <th>Ячейка в структуре</th>
                    </tr>
                </thead>
                <tbody id="refTableBody">
                    <tr>
                        <td colspan="2" style="text-align:center; color:#94a3b8;">Загрузка данных...</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="tree-viewport">
            <div id="mainTreeDisplay" class="tree-wrapper">
                </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
