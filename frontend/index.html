<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.4, minimum-scale=0.1, maximum-scale=5.0, user-scalable=yes">
    <title>Панель Admina — Модель 1-2-4 (Сайт №2)</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1a1a24;
            color: #fff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
            min-height: 100vh;
        }
        h1 {
            font-size: 22px;
            color: #00cbc6;
            margin-bottom: 10px;
            text-align: center;
        }
        .controls {
            margin-bottom: 25px;
            width: 100%;
            max-width: 500px;
        }
        .btn-reset {
            background-color: #ff5e57;
            color: white;
            border: none;
            padding: 10px 15px;
            font-size: 14px;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
        }
        .scroll-wrapper {
            width: 100%;
            overflow: auto;
            display: block;
            padding: 20px 0;
            touch-action: pan-x pan-y;
            -webkit-overflow-scrolling: touch;
        }
        .tree-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
            width: max-content;
            margin: 0 auto;
            padding: 20px;
        }
        .level-row {
            display: flex;
            justify-content: center;
            gap: 10px;
            width: max-content;
        }
        
        /* Главный контейнер для разветвления */
        .split-container {
            display: flex;
            justify-content: center;
            width: 100%;
        }

        /* 4 независимые вертикальные ветки матрицы */
        .branch {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
            min-width: max-content;
        }

        /* ТВОИ ЖЕСТКИЕ ОТСТУПЫ ПО КРАСНЫМ МЕТКАМ (РАЗЪЕЗД НА 2 ЯЧЕЙКИ ~ 170px) */
        .b-1 { margin-right: 85px; }  /* Разрыв внутри левой стороны */
        .b-2 { margin-right: 250px; } /* Огромный центральный разрыв между Лево и Право */
        .b-3 { margin-right: 85px; }  /* Разрыв внутри правой стороны */

        .cell {
            background: #2c2c3e;
            border: 2px solid #3e3e56;
            border-radius: 8px;
            padding: 10px;
            width: 75px;
            text-align: center;
            font-size: 11px;
            box-sizing: border-box;
            flex-shrink: 0;
        }
        .cell.color-gold {
            background: #ffd700;
            border-color: #b8860b;
            color: #000;
        }
        .cell.color-gold .cell-id { color: #000; }
        .cell.color-gold .cell-user { color: #111; }

        .cell.color-blue {
            background: #1e90ff;
            border-color: #0000ff;
            color: #fff;
        }
        .cell.color-blue .cell-id { color: #fff; }
        .cell.color-blue .cell-user { color: #f0f0f0; }

        .cell.color-gray {
            background: #2c2c3e;
            border: 2px solid #3e3e56;
        }
        .cell.occupied {
            border-color: #05c46b;
        }
        .cell-id {
            font-weight: bold;
            color: #00cbc6;
            margin-bottom: 4px;
            font-size: 13px;
        }
        .cell-user {
            color: #d2dae2;
            word-break: break-all;
            min-height: 14px;
            line-height: 1.2;
        }
    </style>
</head>
<body>

    <h1>📊 Визуальная структура (До ряда F включительно)</h1>
    
    <div class="controls">
        <button class="btn-reset" id="resetBtn">Сбросить дерево (Очистить БД)</button>
        <input type="range" id="zoomSlider" min="0.1" max="1.5" step="0.05" value="0.6" style="width: 100%; margin-top: 15px;">
    </div>

    <div class="scroll-wrapper">
        <div class="tree-container">
            <div class="level-row" id="level-A"></div>
            <div class="level-row" id="level-B"></div>
            <div class="level-row" id="level-C"></div>
            
            <div class="split-container">
                <div class="branch b-1">
                    <div class="level-row" id="level-D-1"></div>
                    <div class="level-row" id="level-E-1"></div>
                    <div class="level-row" id="level-F-1"></div>
                </div>
                
                <div class="branch b-2">
                    <div class="level-row" id="level-D-2"></div>
                    <div class="level-row" id="level-E-2"></div>
                    <div class="level-row" id="level-F-2"></div>
                </div>
                
                <div class="branch b-3">
                    <div class="level-row" id="level-D-3"></div>
                    <div class="level-row" id="level-E-3"></div>
                    <div class="level-row" id="level-F-3"></div>
                </div>
                
                <div class="branch">
                    <div class="level-row" id="level-D-4"></div>
                    <div class="level-row" id="level-E-4"></div>
                    <div class="level-row" id="level-F-4"></div>
                </div>
            </div>
        </div>
    </div>

<script src="script.js"></script>
</body>
</html>
